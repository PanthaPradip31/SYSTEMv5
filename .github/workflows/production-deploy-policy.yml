name: Production deploy policy

on:
  workflow_dispatch:
  push:
    branches:
      - production

env:
  PRODUCTION_DEPLOY_BRANCH: production

jobs:
  enforce-production-branch:
    runs-on: ubuntu-latest
    steps:
      - name: Confirm production branch
        shell: bash
        run: |
          echo "Production deploy branch: ${PRODUCTION_DEPLOY_BRANCH}"
          echo "Current branch: ${GITHUB_REF_NAME}"
          if [ "${GITHUB_REF_NAME}" != "${PRODUCTION_DEPLOY_BRANCH}" ]; then
            echo "ERROR: Production deploys are only allowed from the '${PRODUCTION_DEPLOY_BRANCH}' branch."
            exit 1
          fi
          echo "Production branch validation passed."
      - name: Note production deployment process
        run: |
          echo "Use this workflow only for production releases."
          echo "Configure your provider so that the production branch is '${PRODUCTION_DEPLOY_BRANCH}'."
